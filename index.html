<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmplifyAd - Music Promotion Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-gray-100 min-h-screen p-4">

    <div id="authBox" class="max-w-md mx-auto mt-20 bg-slate-900 border border-gray-800 p-8 rounded-2xl shadow-2xl">
        <h1 class="text-2xl font-black text-center text-purple-500 mb-6">AMPLIFYAD AUTH</h1>
        <form id="secureAuthForm" class="space-y-4">
            <input type="email" id="emailInput" placeholder="Email" required class="w-full bg-slate-950 border border-gray-800 rounded-lg px-3 py-2">
            <input type="password" id="passwordInput" placeholder="Password" required minlength="6" class="w-full bg-slate-950 border border-gray-800 rounded-lg px-3 py-2">
            <button type="submit" id="submitBtn" class="w-full bg-purple-600 py-2.5 rounded-lg font-bold">Create Account</button>
        </form>
        <button id="toggleModeBtn" class="w-full mt-4 text-xs text-purple-400 underline">Switch to Log In</button>
    </div>

    <div id="appBox" class="hidden max-w-6xl mx-auto space-y-6 my-6">
        <div class="bg-slate-900 p-4 rounded-2xl flex justify-between items-center border border-gray-800">
            <div>
                <h2 class="text-xl font-black text-purple-500">🎵 AMPLIFYAD STUDIO</h2>
                <p id="welcomeUser" class="text-xs text-gray-400"></p>
            </div>
            <button onclick="logout()" class="bg-slate-950 text-red-400 px-4 py-2 rounded-lg font-bold text-xs border border-gray-800">🚪 Log Out</button>
        </div>

        <form id="adBuilderForm" class="bg-slate-900 p-6 rounded-2xl border border-gray-800 grid md:grid-cols-2 gap-4">
            <input type="text" id="trackName" required placeholder="Track Name" class="bg-slate-950 border border-gray-800 rounded-lg p-2">
            <input type="text" id="artistName" required placeholder="Artist Name" class="bg-slate-950 border border-gray-800 rounded-lg p-2">
            <select id="platformSelect" class="bg-slate-950 border border-gray-800 rounded-lg p-2">
                <option value="Spotify Audio">Spotify Ad Network</option>
                <option value="Instagram Reels">Instagram Audio Push</option>
            </select>
            <input type="number" id="adBudget" min="5" value="25" class="bg-slate-950 border border-gray-800 rounded-lg p-2">
            <button type="submit" class="md:col-span-2 bg-purple-600 py-3 rounded-lg font-black uppercase">Review & Pay</button>
        </form>

        <table class="w-full bg-slate-900 border border-gray-800 rounded-2xl text-sm">
            <tbody id="campaignList"></tbody>
        </table>
    </div>

    <div id="paymentModal" class="hidden fixed inset-0 bg-slate-950/80 flex items-center justify-center p-4">
        <div class="bg-slate-900 p-6 rounded-2xl border border-purple-900 w-full max-w-sm text-center space-y-4">
            <h3 class="text-lg font-bold">Google Pay Checkout</h3>
            <button id="payNowBtn" onclick="processSecurePayment()" class="w-full bg-emerald-500 text-slate-950 font-black py-3 rounded-lg uppercase">Process Payment</button>
            <button onclick="closePaymentModal()" class="text-gray-500 underline text-xs">Cancel</button>
        </div>
    </div>

    <script>
        const client = supabase.createClient("https://pjigbhodnviuuchdmwws.supabase.co", "sb_publishable_ch8SXAc1FpqYWcwK45rtMg_wWwlMf7S");
        let signUpMode = true;
        let currentUserEmail = "";
        let pendingCampaignData = null;

        client.auth.onAuthStateChange((event, session) => {
            if (session?.user) {
                currentUserEmail = session.user.email;
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('appBox').classList.remove('hidden');
                document.getElementById('welcomeUser').innerText = `Logged in: ${currentUserEmail}`;
            }
        });

        document.getElementById('secureAuthForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const { error } = await (signUpMode ? client.auth.signUp({email, password}) : client.auth.signInWithPassword({email, password}));
            if (error) alert(error.message);
        };

        document.getElementById('toggleModeBtn').onclick = () => {
            signUpMode = !signUpMode;
            document.getElementById('submitBtn').innerText = signUpMode ? 'Create Account' : 'Access Account';
            document.getElementById('toggleModeBtn').innerText = signUpMode ? 'Switch to Log In' : 'Switch to Sign Up';
        };

        async function processSecurePayment() {
            const payBtn = document.getElementById('payNowBtn');
            payBtn.innerText = "⏳ Opening GPay...";
            
            // 1. IMMEDIATE REDIRECT (This triggers GPay even if DB fails)
            const gpayUrl = `upi://pay?pa=8899168241@fam&pn=AmplifyAd&am=175&cu=INR`;
            window.location.href = gpayUrl;

            // 2. BACKGROUND SYNC (Non-blocking)
            try {
                await client.from('campaigns').insert([{ 
                    user_email: currentUserEmail, 
                    track: "Pending", 
                    status: "Pending Verification" 
                }]);
            } catch (e) { console.error("Sync failed"); }

            document.getElementById('paymentModal').classList.add('hidden');
            payBtn.innerText = "Process Payment";
        }

        function closePaymentModal() { document.getElementById('paymentModal').classList.add('hidden'); }
        async function logout() { await client.auth.signOut(); location.reload(); }
    </script>
</body>
</html>
