<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmplifyAd - Music Promotion Hub</title>
    <!-- Tailwind CSS for modern, responsive UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
    </style>
</head>
<body class="gradient-bg text-gray-100 min-h-screen font-sans">

    <!-- Header Section -->
    <header class="border-b border-gray-800 bg-slate-900/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
                AMPLIFY<span class="text-white">AD</span>
            </h1>
            <span class="bg-emerald-500/10 text-emerald-400 text-xs px-2.5 py-1 rounded-full font-medium border border-emerald-500/20 flex items-center gap-1.5">
                <span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span> Simulated Live Network
            </span>
        </div>
    </header>

    <!-- Main Workspace Dashboard -->
    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Left Side: Creator Form & Live Preview (5 Columns) -->
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-slate-900/80 border border-gray-800 rounded-2xl p-6 shadow-xl">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <span>🎨</span> Design Your Campaign
                </h2>
                
                <!-- Ad Configuration Form -->
                <form id="adForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Artist Name</label>
                        <input type="text" id="artistName" value="Neon Horizon" required class="w-full bg-slate-950 border border-gray-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Track/Album Title</label>
                        <input type="text" id="trackTitle" value="Midnight Drive" required class="w-full bg-slate-950 border border-gray-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500 transition">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Genre</label>
                            <select id="genre" class="w-full bg-slate-950 border border-gray-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500 transition">
                                <option value="Electronic">Electronic</option>
                                <option value="Hip Hop">Hip Hop</option>
                                <option value="Rock">Rock</option>
                                <option value="Pop">Pop</option>
                                <option value="Indie">Indie</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Ad Platform</label>
                            <select id="platform" class="w-full bg-slate-950 border border-gray-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500 transition">
                                <option value="Spotify">Spotify</option>
                                <option value="Apple Music">Apple Music</option>
                                <option value="YouTube">YouTube</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Call To Action</label>
                        <select id="cta" class="w-full bg-slate-950 border border-gray-800 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500 transition">
                            <option value="Stream Now">Stream Now</option>
                            <option value="Pre-Save Track">Pre-Save Track</option>
                            <option value="Watch Music Video">Watch Music Video</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Card Theme</label>
                        <div class="flex gap-2 mt-1">
                            <button type="button" onclick="setTheme('#a855f7')" class="w-6 h-6 rounded-full bg-purple-500 border-2 border-white ring-2 ring-purple-500/20"></button>
                            <button type="button" onclick="setTheme('#ec4899')" class="w-6 h-6 rounded-full bg-pink-500 border border-transparent hover:scale-105 transition"></button>
                            <button type="button" onclick="setTheme('#3b82f6')" class="w-6 h-6 rounded-full bg-blue-500 border border-transparent hover:scale-105 transition"></button>
                            <button type="button" onclick="setTheme('#10b981')" class="w-6 h-6 rounded-full bg-emerald-500 border border-transparent hover:scale-105 transition"></button>
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full mt-2 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-bold py-2.5 rounded-lg text-sm shadow-lg transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                        🚀 Launch Globally
                    </button>
                </form>
            </div>

            <!-- Interactive Real-Time Preview Card Box -->
            <div class="bg-slate-900/40 border border-gray-800 rounded-2xl p-6">
                <h3 class="text-sm font-semibold uppercase tracking-wider text-gray-400 mb-3 flex items-center gap-2">
                    <span class="h-2 w-2 rounded-full bg-purple-500 animate-ping"></span> Live Layout Preview
                </h3>
                <div id="previewCard" class="bg-slate-950 p-5 rounded-xl border-t-4 shadow-2xl transition-all duration-300" style="border-color: #a855f7">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span id="previewGenre" class="text-[10px] uppercase font-bold tracking-widest bg-white/10 px-2 py-0.5 rounded text-purple-300">Electronic</span>
                            <h4 id="previewTrack" class="text-lg font-extrabold mt-1 truncate">Midnight Drive</h4>
                            <p id="previewArtist" class="text-xs text-gray-400 truncate">by Neon Horizon</p>
                        </div>
                        <span id="previewPlatform" class="text-xs font-bold px-2 py-1 bg-slate-900 rounded border border-gray-800">Spotify</span>
                    </div>
                    <div class="h-32 bg-gradient-to-b from-slate-900 to-slate-800 rounded-lg flex items-center justify-center border border-gray-800/60 mb-4 overflow-hidden relative group">
                        <span class="text-3xl">🎵</span>
                    </div>
                    <button type="button" id="previewCta" class="w-full py-2 rounded-md text-xs font-bold text-center tracking-wide uppercase shadow transition-all bg-purple-500 text-white" style="background-color: #a855f7">
                        Stream Now
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Side: Global Dashboard & Real-Time Feed (7 Columns) -->
        <div class="lg:col-span-7 space-y-6">
            <div class="bg-slate-900/80 border border-gray-800 rounded-2xl p-6 shadow-xl flex flex-col h-full">
                <div class="sm:flex justify-between items-center pb-4 border-b border-gray-800 mb-6">
                    <h2 class="text-xl font-bold flex items-center gap-2 mb-2 sm:mb-0">
                        <span>🌍</span> Live Global Ad Feed
                    </h2>
                    <!-- Discovery Filter controls -->
                    <div class="flex items-center gap-2">
                        <select id="feedFilter" onchange="filterFeed()" class="bg-slate-950 border border-gray-800 rounded-lg px-2.5 py-1 text-xs focus:outline-none focus:border-purple-500">
                            <option value="All">All Genres</option>
                            <option value="Electronic">Electronic</option>
                            <option value="Hip Hop">Hip Hop</option>
                            <option value="Rock">Rock</option>
                            <option value="Pop">Pop</option>
                            <option value="Indie">Indie</option>
                        </select>
                    </div>
                </div>

                <!-- Symmetrical Grid Layout for Ad Feed -->
                <div id="globalFeed" class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-h-[580px] overflow-y-auto pr-1">
                    <!-- Dynamic updates inject here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Logic Engine Script -->
    <script>
        let currentThemeColor = '#a855f7';
        // Base starting database data state
        let runningCampaigns = [
            { id: 1, artist: "Astra", track: "Starlight Echoes", genre: "Electronic", platform: "Spotify", cta: "Stream Now", color: "#3b82f6", reaches: 1420 },
            { id: 2, artist: "The Kicks", track: "Out of Time", genre: "Rock", platform: "YouTube", cta: "Watch Music Video", color: "#ec4899", reaches: 845 }
        ];

        // Wire inputs directly to interactive live preview cards
        const inputs = ['artistName', 'trackTitle', 'genre', 'platform', 'cta'];
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', updatePreview);
        });

        function updatePreview() {
            document.getElementById('previewArtist').innerText = 'by ' + document.getElementById('artistName').value;
            document.getElementById('previewTrack').innerText = document.getElementById('trackTitle').value;
            document.getElementById('previewGenre').innerText = document.getElementById('genre').value;
            document.getElementById('previewPlatform').innerText = document.getElementById('platform').value;
            document.getElementById('previewCta').innerText = document.getElementById('cta').value;
        }

        function setTheme(hexColor) {
            currentThemeColor = hexColor;
            document.getElementById('previewCard').style.borderColor = hexColor;
            document.getElementById('previewCta').style.backgroundColor = hexColor;
        }

        // Intercept form submission to inject new records dynamically into feed layout 
        document.getElementById('adForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newCampaign = {
                id: Date.now(),
                artist: document.getElementById('artistName').value,
                track: document.getElementById('trackTitle').value,
                genre: document.getElementById('genre').value,
                platform: document.getElementById('platform').value,
                cta: document.getElementById('cta').value,
                color: currentThemeColor,
                reaches: 0
            };

            runningCampaigns.unshift(newCampaign);
            renderFeed();
            
            // Clean interface resetting form back smoothly
            document.getElementById('trackTitle').value = '';
            updatePreview();
        });

        function renderFeed() {
            const feedContainer = document.getElementById('globalFeed');
            const currentFilter = document.getElementById('feedFilter').value;
            feedContainer.innerHTML = '';

            const activeDataset = currentFilter === 'All' ? runningCampaigns : runningCampaigns.filter(ad => ad.genre === currentFilter);

            if(activeDataset.length === 0) {
                feedContainer.innerHTML = `<div class="col-span-2 text-center text-gray-500 py-12 text-sm">No live campaigns running under this genre selection.</div>`;
                return;
            }

            activeDataset.forEach(ad => {
                const card = document.createElement('div');
                card.className = "bg-slate-950 p-4 rounded-xl border-t-4 border-gray-800 transition-all shadow-md flex flex-col justify-between";
                card.style.borderColor = ad.color;
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start gap-2 mb-2">
                            <span class="text-[9px] uppercase font-extrabold tracking-wider bg-white/5 px-1.5 py-0.5 rounded text-gray-400">${ad.genre}</span>
                            <span class="text-[10px] text-gray-500 font-mono flex items-center gap-1"><span class="h-1.5 w-1.5 rounded-full bg-emerald-400"></span> ${ad.platform}</span>
                        </div>
                        <h4 class="text-sm font-bold truncate">${ad.track}</h4>
                        <p class="text-xs text-gray-400 truncate mb-3">by ${ad.artist}</p>
                    </div>
                    <div>
                        <div class="text-[10px] bg-slate-900 p-2 rounded border border-gray-900 flex justify-between items-center mb-3">
                            <span class="text-gray-500">Global Reach:</span>
                            <span class="font-mono font-bold text-gray-300 increment-reach" data-id="${ad.id}">${ad.reaches} views</span>
                        </div>
                        <a href="#" onclick="alert('Redirecting to absolute ${ad.platform} asset pipeline link...'); return false;" class="block w-full py-1.5 rounded text-center text-[10px] uppercase font-bold tracking-wider text-white" style="background-color: ${ad.color}">
                            ${ad.cta}
                        </a>
                    </div>
                `;
                feedContainer.appendChild(card);
            });
        }

        function filterFeed() { renderFeed(); }

        // Live simulation engine loop tracking metrics performance increments
        setInterval(() => {
            runningCampaigns.forEach(ad => {
                if (Math.random() > 0.4) { 
                    ad.reaches += Math.floor(Math.random() * 4) + 1;
                }
            });
            document.querySelectorAll('.increment-reach').forEach(element => {
                const adId = element.getAttribute('data-id');
                const targetAd = runningCampaigns.find(a => a.id == adId);
                if(targetAd) element.innerText = targetAd.reaches + ' views';
            });
        }, 3000);

        // Initial launch configuration
        renderFeed();
    </script>
</body>
</html>
