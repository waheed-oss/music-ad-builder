<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmplifyAd - Private Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-gray-100 min-h-screen font-sans flex items-center justify-center p-4">

    <!-- AUTH DASHBOARD COMPONENT -->
    <div id="authBox" class="bg-slate-900 border border-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-2xl font-black text-center text-purple-500 mb-6 tracking-wide">AMPLIFYAD AUTH</h1>
        
        <form id="secureAuthForm" class="space-y-4">
            <div>
                <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1">Email</label>
                <input type="email" id="emailInput" required class="w-full bg-slate-950 border border-gray-800 rounded-lg px-3 py-2 text-sm text-white focus:border-purple-500 outline-none">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1">Password</label>
                <input type="password" id="passwordInput" required minlength="6" class="w-full bg-slate-950 border border-gray-800 rounded-lg px-3 py-2 text-sm text-white focus:border-purple-500 outline-none">
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2.5 rounded-lg text-sm transition shadow-lg">
                Create Account (Sign Up)
            </button>
        </form>
        
        <div class="mt-6 text-center text-xs text-gray-400">
            <button type="button" id="toggleModeBtn" class="text-purple-400 hover:underline font-medium">Already have an account? Switch to Log In</button>
        </div>
    </div>

    <!-- MAIN APP BACKSTAGE COMPONENT -->
    <div id="appBox" class="hidden w-full max-w-4xl mx-auto space-y-6">
        <!-- Header Bar -->
        <div class="bg-slate-900 border border-gray-800 p-4 rounded-2xl flex justify-between items-center shadow-xl">
            <div>
                <h2 class="text-lg font-bold text-purple-400">🚀 AmplifyAd Studio</h2>
                <p class="text-xs text-gray-400" id="welcomeUser">Logged in securely</p>
            </div>
            <button onclick="logout()" class="bg-red-950 hover:bg-red-900 text-red-200 border border-red-800 text-xs px-4 py-2 rounded-lg font-bold transition">
                🚪 Secure Log Out
            </button>
        </div>

        <!-- 🛠️ YOUR ACTUAL STUDIO CONTENT GOES HERE 🛠️ -->
        <div class="bg-slate-900 border border-gray-800 p-8 rounded-2xl shadow-xl text-center">
            <span class="text-5xl">🎉</span>
            <h3 class="text-2xl font-black mt-4 mb-2 text-white">Access Granted!</h3>
            <p class="text-sm text-gray-400 max-w-md mx-auto mb-6">
                Your studio vault is securely open. You can now delete this placeholder card and start building your analytics, tools, or tables right here.
            </p>
            
            <!-- Quick Grid Placeholder Example -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-left mt-8">
                <div class="bg-slate-950 p-4 rounded-xl border border-gray-800">
                    <div class="text-xs text-gray-500 uppercase font-bold">Total Campaigns</div>
                    <div class="text-xl font-black text-purple-400 mt-1">12 Active</div>
                </div>
                <div class="bg-slate-950 p-4 rounded-xl border border-gray-800">
                    <div class="text-xs text-gray-500 uppercase font-bold">Ad Spend</div>
                    <div class="text-xl font-black text-emerald-400 mt-1">$1,240.50</div>
                </div>
                <div class="bg-slate-950 p-4 rounded-xl border border-gray-800">
                    <div class="text-xs text-gray-500 uppercase font-bold">Total Clicks</div>
                    <div class="text-xl font-black text-blue-400 mt-1">48.2k</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DB_URL = "https://pjigbhodnviuuchdmwws.supabase.co";
        const DB_KEY = "sb_publishable_ch8SXAc1FpqYWcwK45rtMg_wWwlMf7S";

        const client = supabase.createClient(DB_URL, DB_KEY);
        let signUpMode = true;

        // Automatically watch for login / logout state transformations
        client.auth.onAuthStateChange((event, session) => {
            if (session?.user) {
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('appBox').classList.remove('hidden');
                document.getElementById('welcomeUser').innerText = `Logged in securely as: ${session.user.email}`;
            } else {
                document.getElementById('authBox').classList.remove('hidden');
                document.getElementById('appBox').classList.add('hidden');
            }
        });

        // Toggle UI modes (Sign Up vs Log In)
        document.getElementById('toggleModeBtn').addEventListener('click', () => {
            signUpMode = !signUpMode;
            document.getElementById('submitBtn').innerText = signUpMode ? 'Create Account (Sign Up)' : 'Access Account (Log In)';
            document.getElementById('toggleModeBtn').innerText = signUpMode ? 'Already have an account? Switch to Log In' : 'Need an account? Switch to Sign Up';
        });

        // Intercept form submission
        document.getElementById('secureAuthForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            try {
                if (signUpMode) {
                    const { error } = await client.auth.signUp({ email, password });
                    if (error) {
                        alert("Supabase rejected signup: " + error.message);
                    } else {
                        alert("Account created successfully! If you can't log in right away, make sure 'Confirm Email' is disabled in your Supabase Auth settings.");
                    }
                } else {
                    const { error } = await client.auth.signInWithPassword({ email, password });
                    if (error) alert("Login failed: " + error.message);
                }
            } catch (crash) {
                alert("System network crash: " + crash.message);
            }
        });

        async function logout() {
            await client.auth.signOut();
        }
    </script>
</body>
</html>
