<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmplifyAd - Private Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-gray-100 min-h-screen font-sans flex items-center justify-center p-4">

    <!-- AUTH DASHBOARD COMPONENT -->
    <div id="authBox" class="bg-slate-900 border border-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-2xl font-black text-center text-purple-500 mb-6 tracking-wide">AMPLIFYAD AUTH</h1>
        
        <form id="secureAuthForm" class="space-y-4">
            <div>
                <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1">Email</label>
                <input type="email" id="emailInput" required class="w-full bg-slate-950 border border-gray-800 rounded-lg px-3 py-2 text-sm text-white focus:border-purple-500 outline-none">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1">Password</label>
                <input type="password" id="passwordInput" required minlength="6" class="w-full bg-slate-950 border border-gray-800 rounded-lg px-3 py-2 text-sm text-white focus:border-purple-500 outline-none">
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2.5 rounded-lg text-sm transition shadow-lg">
                Create Account (Sign Up)
            </button>
        </form>
        
        <div class="mt-6 text-center text-xs text-gray-400">
            <button type="button" id="toggleModeBtn" class="text-purple-400 hover:underline font-medium">Already have an account? Switch to Log In</button>
        </div>
    </div>

    <!-- MAIN APP BACKSTAGE COMPONENT (HIDDEN BY DEFAULT) -->
    <div id="appBox" class="hidden text-center max-w-md mx-auto">
        <div class="bg-slate-900 border border-gray-800 p-8 rounded-2xl shadow-xl">
            <span class="text-4xl">🎉</span>
            <h2 class="text-2xl font-bold mt-4 mb-2">Access Granted!</h2>
            <p class="text-sm text-gray-400 mb-6" id="welcomeUser">Your studio vault is securely open.</p>
            <button onclick="logout()" class="bg-gray-800 hover:bg-gray-700 text-xs px-4 py-2 rounded-lg font-bold border border-gray-700 transition">
                🚪 Secure Log Out
            </button>
        </div>
    </div>

    <script>
        // REPLACE THESE TWO STRINGS WITH YOUR COPIED SUPABASE VALUES
        const DB_URL = "https://pjigbhodnviuuchdmwws.supabase.co";
        const DB_KEY = "sb_publishable_ch8SXAc1FpqYWcwK45rtMg_wWwlMf7S";

        // FIXED: Removed the invalid "::" syntax error here
        const client = supabase.createClient(DB_URL, DB_KEY);
        let signUpMode = true;

        // Toggle configuration modes cleanly
        document.getElementById('toggleModeBtn').addEventListener('click', () => {
            signUpMode = !signUpMode;
            document.getElementById('submitBtn').innerText = signUpMode ? 'Create Account (Sign Up)' : 'Access Account (Log In)';
            document.getElementById('toggleModeBtn').innerText = signUpMode ? 'Already have an account? Switch to Log In' : 'Need an account? Switch to Sign Up';
        });

        // Intercept form submission to apply custom cloud operations safely
        document.getElementById('secureAuthForm').addEventListener('submit', async (event) => {
            event.preventDefault(); // Critical: stops the page from refreshing
            
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            if (DB_URL.includes("your-project-id")) {
                alert("Stop! You forgot to paste your actual Supabase URL and Key.");
                return;
            }

            try {
                if (signUpMode) {
                    const { data, error } = await client.auth.signUp({ email, password });
                    if (error) {
                        alert("Supabase rejected signup: " + error.message);
                    } else {
                        alert("Account created successfully! If you are stuck, verify email confirmations are switched OFF in Supabase.");
                        syncSession();
                    }
                } else {
                    const { data, error } = await client.auth.signInWithPassword({ email, password });
                    if (error) {
                        alert("Login failed: " + error.message);
                    } else {
                        syncSession();
                    }
                }
            } catch (crash) {
                alert("System network crash: " + crash.message);
            }
        });

        async function syncSession() {
            const { data: { user } } = await client.auth.getUser();
            if (user) {
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('appBox').classList.remove('hidden');
                document.getElementById('welcomeUser').innerText = `Logged in securely as: ${user.email}`;
            } else {
                document.getElementById('authBox').classList.remove('hidden');
                document.getElementById('appBox').classList.add('hidden');
            }
        }

        async function logout() {
            await client.auth.signOut();
            syncSession();
        }

        // Initialize active checking on boot layout loading sequence
        syncSession();
    </script>
</body>
</html>
